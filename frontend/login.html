<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — NewsPrep</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--accent:#f4b942;--text:#e6edf3;--muted:#7d8590;--card:#1c2128;--green:#3fb950;--red:#e05c5c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(244,185,66,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(244,185,66,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.bg-glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(244,185,66,.08) 0%,transparent 70%);top:-100px;left:50%;transform:translateX(-50%);pointer-events:none}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px 44px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.logo-wrap{text-align:center;margin-bottom:28px}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),#e8961a);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px;box-shadow:0 8px 24px rgba(244,185,66,.3)}
.logo-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:800}
.logo-title em{font-style:normal;color:var(--accent)}
.logo-sub{font-size:.78rem;color:var(--muted);margin-top:3px}
.tabs{display:flex;background:var(--surface);border-radius:10px;padding:3px;margin-bottom:20px;gap:3px}
.tab{flex:1;padding:8px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;background:none;color:var(--muted)}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.inp{width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.86rem;outline:none;transition:border-color .2s;margin-bottom:9px}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
.submit-btn{width:100%;padding:12px;background:var(--accent);color:#0d1117;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:2px}
.submit-btn:hover{opacity:.9;transform:translateY(-1px)}
.link-btn{background:none;border:none;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;padding:0;text-decoration:underline}
.forgot-row{text-align:right;margin-top:-4px;margin-bottom:8px}
.error{background:rgba(224,92,92,.12);border:1px solid rgba(224,92,92,.3);border-radius:8px;padding:9px 13px;font-size:.8rem;color:#e07e7e;margin-bottom:10px;display:none}
.success{background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3);border-radius:8px;padding:9px 13px;font-size:.8rem;color:var(--green);margin-bottom:10px;display:none}
.form-section{display:none}.form-section.active{display:block}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--green);border-radius:10px;padding:11px 18px;font-size:.83rem;color:var(--green);z-index:999;display:none}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">📰</div>
    <div class="logo-title">News<em>Prep</em></div>
    <div class="logo-sub">Current Affairs Portal for Competitive Exams</div>
  </div>

  <div id="errorBox" class="error"></div>
  <div id="successBox" class="success"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('user',this)">👤 User</button>
    <button class="tab" onclick="switchTab('admin',this)">🔐 Admin</button>
  </div>

  <!-- User section -->
  <div class="form-section active" id="userForm">

    <!-- Login form -->
    <div id="loginForm">
      <input class="inp" id="loginEmail" type="email" placeholder="Email address">
      <input class="inp" id="loginPass" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')emailLogin()">
      <div class="forgot-row"><button class="link-btn" onclick="showForgot()">Forgot password?</button></div>
      <button class="submit-btn" onclick="emailLogin()">Sign In</button>
      <div style="text-align:center;margin-top:12px;font-size:.8rem;color:var(--muted)">
        New user? <button class="link-btn" onclick="showSignup()">Create account</button>
      </div>
    </div>

    <!-- Signup form -->
    <div id="signupForm" style="display:none">
      <input class="inp" id="signupName" type="text" placeholder="Full name">
      <input class="inp" id="signupEmail" type="email" placeholder="Email address">
      <input class="inp" id="signupPass" type="password" placeholder="Password (min 6 chars)" onkeydown="if(event.key==='Enter')emailSignup()">
      <button class="submit-btn" onclick="emailSignup()">Create Account</button>
      <div style="text-align:center;margin-top:12px;font-size:.8rem;color:var(--muted)">
        Already have account? <button class="link-btn" onclick="showLogin()">Sign in</button>
      </div>
    </div>

    <!-- Forgot password form -->
    <div id="forgotForm" style="display:none">
      <p style="font-size:.82rem;color:var(--muted);margin-bottom:12px">Enter your registered email to reset password.</p>
      <input class="inp" id="forgotEmail" type="email" placeholder="Email address" onkeydown="if(event.key==='Enter')sendReset()">
      <button class="submit-btn" onclick="sendReset()">Reset Password</button>
      <div style="text-align:center;margin-top:12px;font-size:.8rem;color:var(--muted)">
        <button class="link-btn" onclick="showLogin()">← Back to login</button>
      </div>
    </div>
  </div>

  <!-- Admin section -->
  <div class="form-section" id="adminForm">
    <input class="inp" id="adminEmail" type="email" placeholder="Admin email" onkeydown="if(event.key==='Enter')adminLogin()">
    <input class="inp" id="adminPass" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="submit-btn" onclick="adminLogin()">🔐 Sign in as Admin</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<button id="themeToggleBtn" onclick="toggleTheme()" style="position:fixed;top:16px;right:16px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-family:'DM Sans',sans-serif;font-size:.8rem;color:var(--muted);cursor:pointer;z-index:10;transition:all .2s">☀️ Light Mode</button>

<script src="config.js"></script>
<script>
const ADMIN_EMAIL    = "admin@cadaily.com";
const ADMIN_PASSWORD = "Admin@1234";
const USERS_KEY      = "ca_users_db";

function getUsers() { try { return JSON.parse(localStorage.getItem(USERS_KEY) || "[]"); } catch { return []; } }
function saveUsers(u) { localStorage.setItem(USERS_KEY, JSON.stringify(u)); }

function init() {
  const u = getUser();
  if (u) { window.location.href = u.role === "admin" ? "admin.html" : "index.html"; }
}

function switchTab(tab, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".form-section").forEach(f => f.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById(tab + "Form").classList.add("active");
  clearMessages();
}

function showLogin()  { document.getElementById("loginForm").style.display="block"; document.getElementById("signupForm").style.display="none"; document.getElementById("forgotForm").style.display="none"; clearMessages(); }
function showSignup() { document.getElementById("loginForm").style.display="none"; document.getElementById("signupForm").style.display="block"; document.getElementById("forgotForm").style.display="none"; clearMessages(); }
function showForgot() { document.getElementById("loginForm").style.display="none"; document.getElementById("signupForm").style.display="none"; document.getElementById("forgotForm").style.display="block"; clearMessages(); }

async function emailLogin() {
  const email = document.getElementById("loginEmail").value.trim().toLowerCase();
  const pass  = document.getElementById("loginPass").value;
  if (!email || !pass) { showError("Please enter email and password"); return; }

  // Try API first
  let apiOk = false;
  try {
    const r = await fetch('/api/auth', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'login', email, password:pass, page:'login', device:navigator.userAgent.slice(0,50) })
    });
    const data = await r.json();
    if (r.ok && data.success) {
      // Sync to localStorage for offline fallback
      const users = getUsers();
      if (!users.find(u => u.email === email)) {
        users.push({ name: data.user.name, email, password: btoa(pass) });
        saveUsers(users);
      }
      setUser({ name: data.user.name, email: data.user.email, role: data.user.role, avatar: data.user.name.slice(0,2).toUpperCase() });
      showToast("Welcome back, " + data.user.name + "!");
      setTimeout(() => window.location.href = "index.html", 700);
      apiOk = true;
    } else if (r.status === 401) {
      showError("Invalid email or password"); return;
    } else if (r.status === 404) {
      showError("No account found. Please create an account."); return;
    } else {
      // API error — fall through to localStorage
    }
  } catch(e) { /* API unavailable — use localStorage */ }

  if (apiOk) return;

  // Fallback: localStorage
  const users = getUsers();
  const user  = users.find(u => u.email === email);
  if (!user) { showError("No account found. Please create an account."); return; }
  if (user.password !== btoa(pass)) { showError("Invalid email or password"); return; }
  setUser({ name: user.name, email: user.email, role: "user", avatar: user.name.slice(0,2).toUpperCase() });
  showToast("Welcome back, " + user.name + "!");
  setTimeout(() => window.location.href = "index.html", 700);
}

async function emailSignup() {
  const name  = document.getElementById("signupName").value.trim();
  const email = document.getElementById("signupEmail").value.trim().toLowerCase();
  const pass  = document.getElementById("signupPass").value;
  if (!name || !email || !pass) { showError("Please fill all fields"); return; }
  if (pass.length < 6) { showError("Password must be at least 6 characters"); return; }

  // Always save to localStorage first (guaranteed to work)
  const users = getUsers();
  if (users.find(u => u.email === email)) { showError("Account already exists. Please login."); return; }
  users.push({ name, email, password: btoa(pass) });
  saveUsers(users);

  // Also try API (for cross-device sync)
  try {
    await fetch('/api/auth', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'register', name, email, password:pass, page:'register', device:navigator.userAgent.slice(0,50) })
    });
  } catch(e) { /* API unavailable — localStorage already saved */ }

  setUser({ name, email, role: "user", avatar: name.slice(0,2).toUpperCase() });
  showToast("Welcome, " + name + "!");
  setTimeout(() => window.location.href = "index.html", 700);
}

function sendReset() {
  const email = document.getElementById("forgotEmail").value.trim().toLowerCase();
  if (!email) { showError("Please enter your email"); return; }
  showSuccess("Contact admin@newsprep.com with your email to reset your password.");
}

function adminLogin() {
  const email = document.getElementById("adminEmail").value.trim();
  const pass  = document.getElementById("adminPass").value;
  if (email === ADMIN_EMAIL && pass === ADMIN_PASSWORD) {
    setUser({ name: "Admin", email: ADMIN_EMAIL, role: "admin", avatar: "AD" });
    showToast("Welcome, Admin!");
    setTimeout(() => window.location.href = "admin.html", 700);
  } else {
    showError("Invalid admin credentials");
  }
}

function showError(msg) {
  const b = document.getElementById("errorBox");
  document.getElementById("successBox").style.display = "none";
  b.textContent = msg; b.style.display = "block";
}
function showSuccess(msg) {
  const b = document.getElementById("successBox");
  document.getElementById("errorBox").style.display = "none";
  b.textContent = msg; b.style.display = "block";
}
function clearMessages() {
  document.getElementById("errorBox").style.display = "none";
  document.getElementById("successBox").style.display = "none";
}
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

init();
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
