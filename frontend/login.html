<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — CA Daily Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--accent:#f4b942;--accent2:#e05c5c;--text:#e6edf3;--muted:#7d8590;--card:#1c2128;--green:#3fb950;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(244,185,66,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(244,185,66,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.bg-glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(244,185,66,.08) 0%,transparent 70%);top:-100px;left:50%;transform:translateX(-50%);pointer-events:none}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:440px;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.logo-wrap{text-align:center;margin-bottom:36px}
.logo-icon{width:68px;height:68px;background:linear-gradient(135deg,var(--accent),#e8961a);border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;box-shadow:0 8px 24px rgba(244,185,66,.3)}
.logo-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:var(--text)}
.logo-title em{font-style:normal;color:var(--accent)}
.logo-sub{font-size:.82rem;color:var(--muted);margin-top:4px}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--muted);font-size:.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.google-btn{width:100%;padding:13px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;margin-bottom:10px}
.google-btn:hover{border-color:var(--accent);background:rgba(244,185,66,.05);transform:translateY(-1px)}
.google-icon{width:20px;height:20px}
.saved-accounts{margin-bottom:16px}
.saved-title{font-size:.75rem;color:var(--muted);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.account-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;margin-bottom:6px}
.account-item:hover{border-color:var(--accent);background:rgba(244,185,66,.05)}
.account-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#e8961a);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:#0d1117;flex-shrink:0}
.account-info{flex:1}
.account-name{font-size:.88rem;font-weight:500}
.account-email{font-size:.75rem;color:var(--muted)}
.account-badge{font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:700}
.badge-admin{background:rgba(244,185,66,.2);color:var(--accent)}
.badge-user{background:rgba(63,185,80,.2);color:var(--green)}
.admin-btn{width:100%;padding:13px;background:linear-gradient(135deg,rgba(244,185,66,.15),rgba(244,185,66,.08));border:1px solid rgba(244,185,66,.3);border-radius:12px;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.admin-btn:hover{background:linear-gradient(135deg,rgba(244,185,66,.25),rgba(244,185,66,.15));transform:translateY(-1px)}
.email-form{margin-top:16px}
.inp{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;margin-bottom:8px}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
.submit-btn{width:100%;padding:13px;background:var(--accent);color:#0d1117;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:all .2s}
.submit-btn:hover{opacity:.9;transform:translateY(-1px)}
.toggle-link{text-align:center;margin-top:14px;font-size:.82rem;color:var(--muted)}
.toggle-link a{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:500}
.error{background:rgba(224,92,92,.12);border:1px solid rgba(224,92,92,.3);border-radius:8px;padding:10px 14px;font-size:.82rem;color:#e07e7e;margin-bottom:12px;display:none}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--green);border-radius:10px;padding:12px 20px;font-size:.85rem;color:var(--green);z-index:999;animation:toastIn .3s ease;display:none}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">📰</div>
    <div class="logo-title">CA<em>Daily</em></div>
    <div class="logo-sub">Current Affairs Portal for Competitive Exams</div>
  </div>

  <div id="errorBox" class="error"></div>

  <!-- Google login -->
  <div id="googleSection">
    <button class="google-btn" onclick="loginWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="divider">or</div>

    <button class="admin-btn" onclick="loginAsAdmin()">
      🔐 Sign in as Admin
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
// Pre-saved demo accounts
const DEMO_ACCOUNTS = [
  { name:"Ragav Sharma", email:"ragav@gmail.com", role:"user", avatar:"RS" },
  { name:"Priya Nair",   email:"priya@gmail.com", role:"user", avatar:"PN" },
];
const ADMIN_USER = { name:"Admin", email:"admin@cadaily.com", role:"admin", avatar:"AD" };

async function init() {
  if (await isLogged()) { window.location.href = (await isAdmin()) ? "admin.html" : "index.html"; return; }
  // Remove saved accounts since using real auth
}

function showEmailForm() {
  document.getElementById("savedAccounts").style.display = "none";
  document.getElementById("googleSection").style.display = "none";
  document.getElementById("emailForm").style.display = "block";
}

function toggleEmailForm() {
  const ef = document.getElementById("emailForm");
  const gs = document.getElementById("googleSection");
  ef.style.display = ef.style.display === "none" ? "block" : "none";
  gs.style.display = gs.style.display === "none" ? "block" : "none";
}

function loginWithGoogle() {
  supabase.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + '/index.html'
    }
  });
}

function loginAsAdmin() {
  doLogin(ADMIN_USER);
}

function loginWithEmail() {
  const email = document.getElementById("emailInp").value.trim();
  const name  = document.getElementById("nameInp").value.trim() || email.split("@")[0];
  if (!email) { showError("Please enter email"); return; }
  if (email === "admin@cadaily.com") { doLogin(ADMIN_USER); return; }
  const acc = { name, email, role:"user", avatar: name.slice(0,2).toUpperCase() };
  // Save to accounts
  const saved = JSON.parse(localStorage.getItem("ca_saved_accounts") || "[]");
  if (!saved.find(s => s.email === email)) { saved.push(acc); localStorage.setItem("ca_saved_accounts", JSON.stringify(saved)); }
  doLogin(acc);
}

function doLogin(acc) {
  setUser({ ...acc, loginTime: new Date().toISOString() });
  showToast("Welcome, " + acc.name + "!");
  setTimeout(() => { window.location.href = acc.role === "admin" ? "admin.html" : "index.html"; }, 800);
}

function showError(msg) {
  const b = document.getElementById("errorBox");
  b.textContent = msg; b.style.display = "block";
  setTimeout(() => b.style.display = "none", 3000);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

init();
</script>
</body>
</html>
