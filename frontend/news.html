<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Current Affairs — CA Daily</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--accent:#f4b942;--text:#e6edf3;--muted:#7d8590;--card:#1c2128;--green:#3fb950;--blue:#58a6ff;--red:#e05c5c}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:100}
.sb-logo{padding:20px;border-bottom:1px solid var(--border)}
.sb-logo-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:800}
.sb-logo-title em{font-style:normal;color:var(--accent)}
.sb-nav{padding:12px;flex:1}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:.88rem;font-weight:500;color:var(--muted);transition:all .2s;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:rgba(244,185,66,.08);color:var(--text)}
.nav-item.active{background:rgba(244,185,66,.12);color:var(--accent);font-weight:600}
/* Main layout */
.main{margin-left:240px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.page-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:800}
.search-wrap{position:relative}
.search-inp{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 16px 8px 36px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--text);outline:none;width:300px;transition:border-color .2s}
.search-inp:focus{border-color:var(--accent)}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted)}
/* Content layout */
.content-layout{display:flex;flex:1}
/* Filters sidebar */
.filters-panel{width:260px;min-height:100%;background:var(--surface);border-right:1px solid var(--border);padding:20px;flex-shrink:0}
.filter-section{margin-bottom:20px}
.filter-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.date-inp{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--text);outline:none;margin-bottom:6px;transition:border-color .2s}
.date-inp:focus{border-color:var(--accent)}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.5)}
.quick-btns{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.qbtn{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.75rem;color:var(--muted);cursor:pointer;transition:all .2s}
.qbtn:hover{border-color:var(--accent);color:var(--accent)}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:none;border:none;padding:8px 10px;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.83rem;color:var(--muted);transition:all .2s;text-align:left}
.cat-btn:hover{background:rgba(244,185,66,.06);color:var(--text)}
.cat-btn.active{background:rgba(244,185,66,.12);color:var(--accent);font-weight:600}
.cat-cnt{font-size:.7rem;background:var(--bg);padding:1px 6px;border-radius:10px}
.cat-btn.active .cat-cnt{background:rgba(244,185,66,.2);color:var(--accent)}
.apply-btn{width:100%;background:var(--accent);color:#0d1117;border:none;border-radius:10px;padding:10px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:6px;transition:opacity .2s}
.apply-btn:hover{opacity:.9}
.clear-btn{width:100%;background:none;border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:9px;font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;margin-top:6px;transition:all .2s}
.clear-btn:hover{border-color:var(--red);color:var(--red)}
/* Articles area */
.articles-area{flex:1;padding:20px 24px;overflow-y:auto}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.results-info{font-size:.85rem;color:var(--muted)}
.results-info strong{color:var(--text)}
.sort-sel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--text);outline:none;cursor:pointer}
/* Article card */
.article-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:12px;transition:all .2s;animation:slideUp .3s ease both}
.article-card:hover{border-color:rgba(244,185,66,.25);transform:translateY(-1px)}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.badge{padding:3px 10px;border-radius:5px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.src-tag{font-size:.75rem;color:var(--muted);text-decoration:none;transition:color .2s}
.src-tag:hover{color:var(--accent)}
.date-tag{font-size:.75rem;color:var(--muted);margin-left:auto}
.score-chip{background:rgba(244,185,66,.12);color:var(--accent);font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:4px}
.card-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;line-height:1.4;margin-bottom:8px}
.card-summary{font-size:.83rem;line-height:1.75;color:#9aa0b4;white-space:pre-line;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;transition:all .3s}
.card-summary.exp{-webkit-line-clamp:unset;overflow:visible}
.card-footer{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap}
.rm-btn{background:none;border:none;cursor:pointer;font-size:.8rem;color:var(--accent);font-family:'DM Sans',sans-serif;font-weight:600;padding:0}
.src-btn{text-decoration:none;font-size:.8rem;font-weight:600;color:var(--blue);transition:opacity .2s}
.src-btn:hover{opacity:.75}
.bm-btn{background:none;border:1px solid var(--border);cursor:pointer;font-size:.78rem;color:var(--muted);padding:4px 10px;border-radius:6px;font-family:'DM Sans',sans-serif;transition:all .2s;margin-left:auto}
.bm-btn:hover,.bm-btn.saved{border-color:var(--accent);color:var(--accent)}
/* Pagination */
.pagination{display:flex;justify-content:center;gap:6px;padding:20px 0}
.pg-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:.82rem;font-family:'DM Sans',sans-serif;color:var(--muted);cursor:pointer;transition:all .2s}
.pg-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.pg-btn.active{background:var(--accent);color:#0d1117;border-color:var(--accent);font-weight:700}
.pg-btn:disabled{opacity:.4;cursor:default}
/* Empty/loading */
.empty{text-align:center;padding:60px;color:var(--muted)}
.skeleton{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px}
.sk{background:linear-gradient(90deg,var(--surface) 25%,var(--border) 50%,var(--surface) 75%);background-size:200% 100%;border-radius:4px;animation:shimmer 1.4s infinite}
@keyframes shimmer{to{background-position:-200% 0}}
.sk-t{height:18px;width:60%;margin-bottom:10px}
.sk-b{height:12px;width:100%;margin-bottom:6px}
.sk-b2{height:12px;width:80%}
/* Cat colors */
.c-eco{background:rgba(63,185,80,.15);color:#3fb950}.c-pol{background:rgba(188,140,255,.15);color:#bc8cff}
.c-int{background:rgba(88,166,255,.15);color:#58a6ff}.c-sci{background:rgba(244,185,66,.15);color:#f4b942}
.c-sch{background:rgba(224,92,92,.15);color:#e05c5c}.c-rep{background:rgba(92,184,224,.15);color:#5cb8e0}
.c-spo{background:rgba(92,224,184,.15);color:#5ce0b8}.c-awa{background:rgba(224,184,92,.15);color:#e0b85c}
.c-imp{background:rgba(224,120,92,.15);color:#e0785c}.c-sum{background:rgba(120,92,224,.15);color:#785ce0}
.c-nat{background:rgba(244,185,66,.15);color:#f4b942}.c-sta{background:rgba(66,185,244,.15);color:#42b9f4}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:.83rem;color:var(--green);z-index:999;animation:toastIn .3s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>requireLogin();</script>

<nav class="sidebar">
  <div class="sb-logo"><div class="sb-logo-title">CA<em>Daily</em> Portal</div></div>
  <div class="sb-nav">
    <a class="nav-item" href="index.html">🏠 Home</a>
    <a class="nav-item active" href="news.html">📰 Current Affairs</a>
    <a class="nav-item" href="quiz.html">🧠 Daily Quiz</a>
    <a class="nav-item" href="profile.html">👤 Profile</a>
    <a class="nav-item" id="adminLink" href="admin.html" style="display:none">⚙️ Admin Panel</a>
    <a class="nav-item" href="#" onclick="clearUser();location.href='login.html'">🚪 Logout</a>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="page-title">📰 Current Affairs</div>
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input class="search-inp" id="searchInp" placeholder="Search articles…" oninput="onSearch(this.value)">
    </div>
  </div>

  <div class="content-layout">
    <!-- Filters -->
    <div class="filters-panel">
      <div class="filter-section">
        <div class="filter-title">Date Range</div>
        <input type="date" class="date-inp" id="dateFrom">
        <input type="date" class="date-inp" id="dateTo">
        <div class="quick-btns">
          <button class="qbtn" onclick="setRange(1)">Today</button>
          <button class="qbtn" onclick="setRange(7)">7 days</button>
          <button class="qbtn" onclick="setRange(15)">15 days</button>
          <button class="qbtn" onclick="setRange(30)">30 days</button>
        </div>
      </div>
      <div class="filter-section">
        <div class="filter-title">Category</div>
        <div id="catList"></div>
      </div>
      <button class="apply-btn" onclick="applyFilters()">Apply Filters</button>
      <button class="clear-btn" onclick="clearFilters()">✕ Clear All</button>
    </div>

    <!-- Articles -->
    <div class="articles-area">
      <div class="top-bar">
        <div class="results-info" id="resInfo">Loading…</div>
        <select class="sort-sel" id="sortSel" onchange="applyFilters()">
          <option value="date">Latest First</option>
          <option value="score">Highest Score</option>
        </select>
      </div>
      <div id="artList"></div>
      <div class="pagination" id="pgn"></div>
    </div>
  </div>
</div>

<script>
const CATS=[
  {name:"Economy & Banking",cls:"c-eco"},{name:"Polity & Governance",cls:"c-pol"},
  {name:"International Relations",cls:"c-int"},{name:"Science & Technology",cls:"c-sci"},
  {name:"Schemes & Appointments",cls:"c-sch"},{name:"Reports & Indices",cls:"c-rep"},
  {name:"Sports",cls:"c-spo"},{name:"Awards & Honours",cls:"c-awa"},
  {name:"Important Days & Obituaries",cls:"c-imp"},{name:"Summits & Conferences",cls:"c-sum"},
  {name:"National News",cls:"c-nat"},{name:"State News",cls:"c-sta"},
];
const CMAP={};CATS.forEach(c=>CMAP[c.name]=c.cls);

let st={page:1,ps:20,cat:"All",from:"",to:"",q:"",total:0,pages:1};
let srchTimer=null;

// Init
const u=getUser();if(u&&isAdmin())document.getElementById("adminLink").style.display="flex";
trackVisit();

// URL params
const up=new URLSearchParams(location.search);
if(up.get("cat"))st.cat=up.get("cat");
if(up.get("q")){st.q=up.get("q");document.getElementById("searchInp").value=st.q;}

// Default dates: last 30 days
const today=new Date(),wago=new Date();wago.setDate(today.getDate()-30);
document.getElementById("dateTo").value=today.toISOString().slice(0,10);
document.getElementById("dateFrom").value=wago.toISOString().slice(0,10);
st.from=document.getElementById("dateFrom").value;
st.to=document.getElementById("dateTo").value;

// Build cat list
const catListEl=document.getElementById("catList");
catListEl.innerHTML=`<button class="cat-btn ${st.cat==='All'?'active':''}" data-c="All" onclick="setCat('All',this)">All Categories</button>`;
CATS.forEach(c=>{
  const b=document.createElement("button");b.className="cat-btn"+(st.cat===c.name?" active":"");
  b.dataset.c=c.name;b.innerHTML=`${c.name} <span class="cat-cnt" id="cc-${c.name.replace(/\W/g,'')}">—</span>`;
  b.onclick=function(){setCat(c.name,this)};catListEl.appendChild(b);
});

function setRange(days){
  const t=new Date(),f=new Date();f.setDate(t.getDate()-days+1);
  document.getElementById("dateTo").value=t.toISOString().slice(0,10);
  document.getElementById("dateFrom").value=f.toISOString().slice(0,10);
  applyFilters();
}
function setCat(c,btn){
  st.cat=c;st.page=1;
  document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
}
function onSearch(v){clearTimeout(srchTimer);srchTimer=setTimeout(()=>{st.q=v;st.page=1;loadArts();},400);}
function applyFilters(){st.from=document.getElementById("dateFrom").value;st.to=document.getElementById("dateTo").value;st.page=1;loadArts();}
function clearFilters(){st={...st,cat:"All",from:"",to:"",q:"",page:1};document.getElementById("dateFrom").value="";document.getElementById("dateTo").value="";document.getElementById("searchInp").value="";document.querySelectorAll(".cat-btn").forEach(b=>b.classList.toggle("active",b.dataset.c==="All"));loadArts();}

function showSkel(){document.getElementById("artList").innerHTML=Array(5).fill("").map(()=>`<div class="skeleton"><div class="sk sk-t"></div><div class="sk sk-b"></div><div class="sk sk-b2"></div></div>`).join("");}

async function loadArts(){
  showSkel();
  const params={
    select:"id,title,summary,url,source,category,relevance_score,published_at",
    order:document.getElementById("sortSel").value==="score"?"relevance_score.desc":"published_at.desc",
    limit:st.ps,offset:(st.page-1)*st.ps
  };
  if(st.cat&&st.cat!=="All") params["category"]="eq."+st.cat;
  if(st.from) params["published_at"]="gte."+st.from+"T00:00:00+00:00";
  if(st.to) params["published_at"]="lte."+st.to+"T23:59:59+00:00";
  if(st.q) params["or"]="(title.ilike.*"+st.q+"*,summary.ilike.*"+st.q+"*)";

  try{
    const {data,count}=await sbFetch("exam_ca_articles",params);
    st.total=count;st.pages=Math.max(1,Math.ceil(count/st.ps));
    renderArts(data);renderPgn();
    document.getElementById("resInfo").innerHTML=`Showing <strong>${data.length}</strong> of <strong>${count}</strong> articles`;
    const cc=await sbFetch("exam_ca_articles",{select:"category",is_visible:"eq.true"});
    const cnts={};(cc.data||[]).forEach(a=>cnts[a.category]=(cnts[a.category]||0)+1);
    CATS.forEach(c=>{const el=document.getElementById("cc-"+c.name.replace(/\W/g,""));if(el)el.textContent=cnts[c.name]||0;});
  }catch(e){
    document.getElementById("artList").innerHTML=`<div class="empty">⚠️ Update config.js with Supabase credentials</div>`;
    document.getElementById("resInfo").textContent="Error";
  }
}

function renderArts(arts){
  const bm=getBookmarks();
  const list=document.getElementById("artList");
  if(!arts.length){list.innerHTML=`<div class="empty">📭 No articles found. Try changing filters.</div>`;return;}
  list.innerHTML=arts.map((a,i)=>{
    const cls=CMAP[a.category]||"c-nat";
    const pct=Math.round((a.relevance_score||0)*100);
    const saved=!!bm[a.id];
    const d=a.published_at?new Date(a.published_at).toLocaleDateString("en-IN",{day:"numeric",month:"short"}):"";
    return`<div class="article-card" style="animation-delay:${i*0.04}s" onclick="markRead(${a.id})">
      <div class="card-meta">
        <span class="badge ${cls}">${a.category}</span>
        ${a.url?`<a href="${a.url}" target="_blank" class="src-tag">📰 ${a.source||"Source"} ↗</a>`:`<span class="src-tag">📰 ${a.source||""}</span>`}
        <span class="score-chip">⭐ ${pct}%</span>
        <span class="date-tag">${d}</span>
      </div>
      <div class="card-title">${a.title}</div>
      <div class="card-summary" id="cs-${a.id}">${a.summary||"No summary."}</div>
      <div class="card-footer">
        <button class="rm-btn" onclick="toggleSum(event,${a.id})">Read more ▼</button>
        ${a.url?`<a href="${a.url}" target="_blank" class="src-btn">🔗 Source ↗</a>`:""}
        <button class="bm-btn ${saved?"saved":""}" onclick="toggleBm(event,${a.id},'${encodeURIComponent(JSON.stringify({id:a.id,title:a.title,category:a.category,source:a.source,url:a.url}))}')">${saved?"✅ Saved":"🔖 Save"}</button>
      </div>
    </div>`;
  }).join("");
}

function toggleSum(e,id){e.stopPropagation();const el=document.getElementById("cs-"+id);const btn=e.target;const exp=el.classList.toggle("exp");btn.textContent=exp?"Read less ▲":"Read more ▼";}
function toggleBm(e,id,data){
  e.stopPropagation();
  const bm=getBookmarks();const btn=e.target;
  if(bm[id]){delete bm[id];btn.textContent="🔖 Save";btn.classList.remove("saved");toast("Bookmark removed");}
  else{bm[id]=JSON.parse(decodeURIComponent(data));btn.textContent="✅ Saved";btn.classList.add("saved");toast("Bookmarked! ⭐");}
  saveBookmarks(bm);
}
function toast(msg){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}

function renderPgn(){
  const pg=document.getElementById("pgn");
  if(st.pages<=1){pg.innerHTML="";return;}
  let h=`<button class="pg-btn" onclick="goPage(${st.page-1})" ${st.page<=1?"disabled":""}>← Prev</button>`;
  const s=Math.max(1,st.page-2),e=Math.min(st.pages,st.page+2);
  for(let p=s;p<=e;p++)h+=`<button class="pg-btn ${p===st.page?"active":""}" onclick="goPage(${p})">${p}</button>`;
  if(e<st.pages)h+=`<button class="pg-btn" onclick="goPage(${st.pages})">${st.pages}</button>`;
  h+=`<button class="pg-btn" onclick="goPage(${st.page+1})" ${st.page>=st.pages?"disabled":""}>Next →</button>`;
  pg.innerHTML=h;
}
function goPage(p){if(p<1||p>st.pages)return;st.page=p;loadArts();window.scrollTo({top:0,behavior:"smooth"});}

loadArts();
</script>
</body>
</html>
