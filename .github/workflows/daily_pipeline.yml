name: Daily CA News Pipeline

on:
  schedule:
    - cron: '0 0 * * *'    # 5:30 AM IST
    - cron: '30 3 * * *'   # 9:00 AM IST
    - cron: '30 6 * * *'   # 12:00 PM IST
    - cron: '30 9 * * *'   # 3:00 PM IST
    - cron: '30 12 * * *'  # 6:00 PM IST
    - cron: '30 15 * * *'  # 9:00 PM IST
  workflow_dispatch:

concurrency:
  group: pipeline-articles-json
  cancel-in-progress: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-actions.txt

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-mpnet-bart-${{ runner.os }}
          restore-keys: hf-models-mpnet-bart-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-actions.txt
          python -c "import nltk; nltk.download('punkt', quiet=True); nltk.download('punkt_tab', quiet=True)"

      - name: Run ML Pipeline
        run: |
          python -c "
          import logging, json, os
          logging.basicConfig(level=logging.INFO, format='%(asctime)s [%(levelname)s] %(message)s')
          from backend.pipeline import run_pipeline_once
          use_api = bool(os.environ.get('NEWSDATA_API_KEY', '').strip())
          result = run_pipeline_once(use_rss=True, use_api=use_api, max_feeds=None)
          print(json.dumps(result, indent=2))
          "

      - name: Export articles to JSON
        run: |
          mkdir -p frontend/data
          python -c "
          import logging, sys, os
          logging.basicConfig(level=logging.INFO)
          from backend.json_exporter import export_articles_json
          n = export_articles_json('frontend/data/articles.json')
          print(f'Exported {n} articles to frontend/data/articles.json')
          "

      - name: Commit and push articles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save freshly generated file BEFORE any git operations
          cp frontend/data/articles.json /tmp/articles_new.json

          # Pull latest remote cleanly with no conflicts
          git fetch origin main
          git reset --hard origin/main

          # Restore our generated file on top of clean remote
          cp /tmp/articles_new.json frontend/data/articles.json

          # Check if anything actually changed
          if git diff --quiet frontend/data/articles.json; then
            echo "No changes to articles.json, skipping push"
            exit 0
          fi

          git add frontend/data/articles.json
          git commit -m "chore: update articles.json [skip ci]"
          git push origin main
          echo "✅ Push successful"

      - name: Log pipeline summary
        if: always()
        run: echo "Pipeline complete at $(date -u '+%Y-%m-%d %H:%M UTC')"
