name: Daily CA News Pipeline

on:
  schedule:
    - cron: "0 3 * * *"   # Runs daily at 3 AM UTC
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache dependencies (optional but faster)
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ca-portal
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        working-directory: ca_portal_fixed
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-actions.txt

      # 5. Run pipeline
      - name: Run News Pipeline
        working-directory: ca_portal_fixed
        run: |
          python run.py
