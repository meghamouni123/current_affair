<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — CA Daily Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--accent:#f4b942;--text:#e6edf3;--muted:#7d8590;--card:#1c2128;--green:#3fb950;--red:#e05c5c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(244,185,66,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(244,185,66,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.bg-glow{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(244,185,66,.08) 0%,transparent 70%);top:-100px;left:50%;transform:translateX(-50%);pointer-events:none}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.logo-wrap{text-align:center;margin-bottom:32px}
.logo-icon{width:68px;height:68px;background:linear-gradient(135deg,var(--accent),#e8961a);border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:16px;box-shadow:0 8px 24px rgba(244,185,66,.3)}
.logo-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800}
.logo-title em{font-style:normal;color:var(--accent)}
.logo-sub{font-size:.82rem;color:var(--muted);margin-top:4px}
.tabs{display:flex;background:var(--surface);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:9px;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;background:none;color:var(--muted)}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.inp{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;margin-bottom:10px}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}
.submit-btn{width:100%;padding:13px;background:var(--accent);color:#0d1117;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}
.submit-btn:hover{opacity:.9;transform:translateY(-1px)}
.error{background:rgba(224,92,92,.12);border:1px solid rgba(224,92,92,.3);border-radius:8px;padding:10px 14px;font-size:.82rem;color:#e07e7e;margin-bottom:12px;display:none}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card);border:1px solid var(--green);border-radius:10px;padding:12px 20px;font-size:.85rem;color:var(--green);z-index:999;display:none}
.form-section{display:none}.form-section.active{display:block}
.google-btn{width:100%;padding:13px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s;margin-bottom:4px}
.google-btn:hover{border-color:var(--accent);background:rgba(244,185,66,.05);transform:translateY(-1px)}
.google-icon{width:20px;height:20px}
.divider{display:flex;align-items:center;gap:12px;margin:12px 0;color:var(--muted);font-size:.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">📰</div>
    <div class="logo-title">CA<em>Daily</em></div>
    <div class="logo-sub">Current Affairs Portal for Competitive Exams</div>
  </div>

  <div id="errorBox" class="error"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('user',this)">👤 User Login</button>
    <button class="tab" onclick="switchTab('admin',this)">🔐 Admin Login</button>
  </div>

  <!-- User login: name + email only -->
  <div class="form-section active" id="userForm">
    <input class="inp" id="userName" type="text" placeholder="Your name">
    <input class="inp" id="userEmail" type="email" placeholder="Email address" onkeydown="if(event.key==='Enter')userLogin()">
    <button class="submit-btn" onclick="userLogin()">Enter Portal →</button>
  </div>

  <!-- Admin login -->
  <div class="form-section" id="adminForm">
    <input class="inp" id="adminEmail" type="email" placeholder="Admin email" onkeydown="if(event.key==='Enter')adminLogin()">
    <input class="inp" id="adminPass" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="submit-btn" onclick="adminLogin()">🔐 Sign in as Admin</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
const ADMIN_EMAIL    = "admin@cadaily.com";
const ADMIN_PASSWORD = "Admin@1234";

function init() {
  const u = getUser();
  if (u) { window.location.href = u.role === "admin" ? "admin.html" : "index.html"; }
}

function switchTab(tab, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".form-section").forEach(f => f.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById(tab + "Form").classList.add("active");
}

function userLogin() {
  const name  = document.getElementById("userName").value.trim();
  const email = document.getElementById("userEmail").value.trim();
  if (!email) { showError("Please enter your email"); return; }
  const n = name || email.split("@")[0];
  setUser({ name: n, email, role: "user", avatar: n.slice(0,2).toUpperCase() });
  showToast("Welcome, " + n + "!");
  setTimeout(() => window.location.href = "index.html", 700);
}

function adminLogin() {
  const email = document.getElementById("adminEmail").value.trim();
  const pass  = document.getElementById("adminPass").value;
  if (email === ADMIN_EMAIL && pass === ADMIN_PASSWORD) {
    setUser({ name: "Admin", email: ADMIN_EMAIL, role: "admin", avatar: "AD" });
    showToast("Welcome, Admin!");
    setTimeout(() => window.location.href = "admin.html", 700);
  } else {
    showError("Invalid admin credentials");
  }
}

function showError(msg) {
  const b = document.getElementById("errorBox");
  b.textContent = msg; b.style.display = "block";
  setTimeout(() => b.style.display = "none", 3000);
}
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

init();
</script>
</body>
</html>
